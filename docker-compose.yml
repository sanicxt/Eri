services:
  eri:
    build: .
    container_name: eri
    restart: unless-stopped
    environment:
      # Pass the .env values to the container.  The bot uses dotenv, but
      # ENV vars in the Compose file take precedence over the file.
      - TOKEN=${TOKEN}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      # Optional customisation
      - FFMPEG_PATH=/usr/bin/ffmpeg
      - YOUTUBE_REGION=IN
      - YOUTUBE_LANG=en
      - YOUTUBE_TIMEZONE=Asia/Kolkata
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # YouTube cookies (optional)
    # Uncomment the lines below and place a Netscape-format cookies file
    # at ./youtube.cookies.txt if you need authenticated YouTube sessions.
    # volumes:
    #   - ./youtube.cookies.txt:/eri/youtube.cookies.txt:ro
